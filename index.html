<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheldon Mind Reader: RPSLS</title>
    <style>
        /* Exact Theme Colors from your Image */
        :root { --bg: #16213e; --panel: #0f172a; --accent: #38bdf8; --gold: #fbbf24; --red: #ef4444; --green: #10b981; }

        body { font-family: 'Inter', system-ui, sans-serif; background: #0b1120; color: #f8fafc; margin: 0; padding: 15px; display: flex; align-items: center; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        
        .container { width: 100%; max-width: 600px; background: var(--bg); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,.6); position: relative; border: 1px solid #1e293b; }

        /* Info Icon */
        .info-btn { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid var(--accent); color: var(--accent); width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 14px; opacity: 0.7; transition: 0.3s; }
        .info-btn:hover { opacity: 1; background: rgba(56, 189, 248, 0.1); }

        .scoreboard { display: flex; justify-content: center; gap: 40px; font-size: 2.2rem; font-weight: 900; color: var(--accent); margin-top: 10px; }
        .streak-bar { font-size: 1.1rem; color: var(--green); font-weight: bold; margin: 15px 0; }
        .streak-bar span { color: #94a3b8; font-weight: normal; }

        /* Battle Zone */
        .battle-zone { display: flex; justify-content: center; align-items: center; gap: 25px; margin: 20px 0; }
        .slot { text-align: center; }
        .slot img { width: 90px; height: 90px; border-radius: 15px; border: 2px solid #1e293b; background: var(--panel); opacity: 0.2; transition: 0.3s; padding: 5px; }
        .vs { font-weight: 900; color: var(--red); font-size: 1.4rem; }
        .label { font-size: 0.7rem; color: #64748b; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

        #status-msg { font-size: 1.3rem; font-weight: bold; color: var(--gold); margin: 20px 0; min-height: 1.5em; }

        /* Neon Buttons */
        .choices { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 30px; }
        .choice-btn { background: var(--panel); border: 2px solid #1e293b; border-radius: 12px; padding: 6px; cursor: pointer; transition: 0.2s; }
        .choice-btn img { width: 70px; height: 70px; display: block; border-radius: 8px; }
        .choice-btn:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(56,189,248,0.3); }

        /* Probability Engine - Matching your Panel */
        .engine-panel { background: var(--panel); padding: 25px; border-radius: 20px; border: 1px solid #1e293b; text-align: left; }
        .engine-title { text-align: center; font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .engine-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .engine-label { width: 80px; font-size: 0.85rem; color: #94a3b8; font-weight: bold; }
        .bar-bg { flex-grow: 1; background: #16213e; height: 10px; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .percent { width: 40px; font-size: 0.85rem; color: #94a3b8; text-align: right; }

        /* Reset Button */
        .reset-btn { width: 100%; margin-top: 25px; padding: 15px; background: none; border: 2px solid var(--red); color: var(--red); border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .reset-btn:hover { background: var(--red); color: white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        /* Flash Effects */
        #fx-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 100; opacity: 0; }
        .win-fx { background: radial-gradient(circle, rgba(16,185,129,0.2) 0%, transparent 70%); animation: flash 0.6s; }
        .lose-fx { background: radial-gradient(circle, rgba(239,68,68,0.2) 0%, transparent 70%); animation: flash 0.6s; }
        @keyframes flash { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* Animations for slots */
        .winner { border-color: var(--green) !important; transform: scale(1.1); box-shadow: 0 0 20px rgba(16,185,129,0.4); }
        .shaking { animation: shake 0.4s; border-color: var(--red) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* Rules Toggle */
        .rules-modal { display: none; background: #0f172a; border: 1px solid var(--accent); border-radius: 15px; padding: 15px; margin-bottom: 20px; font-size: 0.8rem; text-align: left; }
        .rules-modal b { color: var(--accent); }
    </style>
</head>
<body>

<div id="fx-overlay"></div>

<div class="container">
    <button class="info-btn" onclick="toggleRules()">i</button>
    
    <div class="scoreboard">
        <div>YOU: <span id="p-score">0</span></div>
        <div>SHELDON: <span id="a-score">0</span></div>
    </div>
    
    <div class="streak-bar">
        🔥 Streak: <span id="cur-streak">0</span> &nbsp;|&nbsp; 🏆 Best: <span id="best-streak">0</span>
    </div>

    <div class="rules-modal" id="rules-box">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div><b>Rock</b>: Scissors, Lizard</div><div><b>Paper</b>: Rock, Spock</div>
            <div><b>Scissors</b>: Paper, Lizard</div><div><b>Lizard</b>: Spock, Paper</div>
            <div style="grid-column: span 2; text-align:center;"><b>Spock</b>: Scissors, Rock</div>
        </div>
    </div>

    <div class="battle-zone">
        <div class="slot">
            <img id="p-choice-img" src="rock.jpg">
            <div class="label">YOU</div>
        </div>
        <div class="vs">VS</div>
        <div class="slot">
            <img id="a-choice-img" src="rock.jpg">
            <div class="label">SHELDON</div>
        </div>
    </div>

    <div id="status-msg">Make your move...</div>

    <div class="choices">
        <script>
            const moves = ['rock', 'paper', 'scissors', 'lizard', 'spock'];
            document.write(moves.map(m => `
                <button class="choice-btn" onclick="play('${m}')">
                    <img src="${m}.jpg" alt="${m}">
                </button>
            `).join(''));
        </script>
    </div>

    <div class="engine-panel">
        <div class="engine-title">Sheldon's Probability Engine</div>
        <div id="engine-ui"></div>
    </div>

    <button class="reset-btn" onclick="resetGame()">Reset Game & Memory</button>
</div>

<script>
    // State & Data
    const winRules = {
        rock: ['scissors', 'lizard'], paper: ['rock', 'spock'],
        scissors: ['paper', 'lizard'], lizard: ['spock', 'paper'], spock: ['scissors', 'rock']
    };
    
    let memory = {};
    moves.forEach(m => memory[m] = { rock:0, paper:0, scissors:0, lizard:0, spock:0 });

    let state = { p: 0, a: 0, s: 0, b: 0, last: null };

    // Init Engine Bars
    document.getElementById('engine-ui').innerHTML = moves.map(m => `
        <div class="engine-row">
            <div class="engine-label">${m.toUpperCase()}</div>
            <div class="bar-bg"><div class="bar-fill" id="bar-${m}"></div></div>
            <div class="percent" id="pct-${m}">0%</div>
        </div>
    `).join('');

    function toggleRules() {
        const rb = document.getElementById('rules-box');
        rb.style.display = rb.style.display === 'block' ? 'none' : 'block';
    }

    function play(playerMove) {
        // AI Logic (Markov Chain)
        let aiMove = (!state.last || Math.random() < 0.1) 
            ? moves[Math.floor(Math.random() * 5)] 
            : predictAndCounter(state.last);

        // Update Memory
        if (state.last) memory[state.last][playerMove]++;
        state.last = playerMove;

        // Visual Reset
        const pImg = document.getElementById('p-choice-img');
        const aImg = document.getElementById('a-choice-img');
        const fx = document.getElementById('fx-overlay');
        pImg.className = aImg.className = ''; pImg.style.opacity = aImg.style.opacity = 1;
        fx.className = ''; void fx.offsetWidth;

        pImg.src = `${playerMove}.jpg`;
        aImg.src = `${aiMove}.jpg`;

        // Result Logic
        let msg = "";
        if (playerMove === aiMove) {
            msg = `TIE! Both chose ${playerMove.toUpperCase()}`;
            state.s = 0;
        } else if (winRules[playerMove].includes(aiMove)) {
            state.p++; state.s++; 
            if (state.s > state.b) state.b = state.s;
            msg = `WIN! ${playerMove.toUpperCase()} beats ${aiMove.toUpperCase()}`;
            pImg.classList.add('winner'); aImg.classList.add('shaking');
            fx.className = 'win-fx';
        } else {
            state.a++; state.s = 0;
            msg = `LOSE! ${aiMove.toUpperCase()} beats ${playerMove.toUpperCase()}`;
            aImg.classList.add('winner'); pImg.classList.add('shaking');
            fx.className = 'lose-fx';
            new Audio('bazinga.mp3').play().catch(()=>{});
        }

        // Update UI
        document.getElementById('p-score').innerText = state.p;
        document.getElementById('a-score').innerText = state.a;
        document.getElementById('cur-streak').innerText = state.s;
        document.getElementById('best-streak').innerText = state.b;
        document.getElementById('status-msg').innerText = msg;

        updateEngineUI(playerMove);
    }

    function predictAndCounter(last) {
        const stats = memory[last];
        const predicted = moves.reduce((a, b) => stats[a] > stats[b] ? a : b);
        if (stats[predicted] === 0) return moves[Math.floor(Math.random() * 5)];
        // Find a move that beats the predicted move
        return moves.find(m => winRules[m].includes(predicted));
    }

    function updateEngineUI(last) {
        const stats = memory[last];
        const total = Object.values(stats).reduce((a, b) => a + b, 0);
        moves.forEach(m => {
            const p = total === 0 ? 0 : Math.round((stats[m] / total) * 100);
            document.getElementById(`bar-${m}`).style.width = p + '%';
            document.getElementById(`pct-${m}`).innerText = p + '%';
        });
    }

    function resetGame() {
        state = { p: 0, a: 0, s: 0, b: 0, last: null };
        moves.forEach(m => moves.forEach(next => memory[m][next] = 0));
        
        document.getElementById('p-score').innerText = '0';
        document.getElementById('a-score').innerText = '0';
        document.getElementById('cur-streak').innerText = '0';
        document.getElementById('best-streak').innerText = '0';
        document.getElementById('status-msg').innerText = "Memory wiped. Make your move...";
        
        const pImg = document.getElementById('p-choice-img');
        const aImg = document.getElementById('a-choice-img');
        pImg.style.opacity = aImg.style.opacity = 0.2;
        pImg.className = aImg.className = '';

        moves.forEach(m => {
            document.getElementById(`bar-${m}`).style.width = '0%';
            document.getElementById(`pct-${m}`).innerText = '0%';
        });
    }
</script>

</body>
</html>
